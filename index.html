<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Conectados — Marzo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1916;
  --text2: #6b6a65;
  --text3: #9e9d98;
  --green: #1a7a52;
  --green-bg: #e6f4ed;
  --red: #c0392b;
  --red-bg: #fdecea;
  --amber: #925c00;
  --amber-bg: #fef3e0;
  --blue: #1a5a8a;
  --blue-bg: #e8f1fa;
  --tambo-c: #1a5a8a;
  --tambo-bg: #e8f1fa;
  --oxxo-c: #1a6644;
  --oxxo-bg: #e4f2eb;
  --primax-c: #854f0b;
  --primax-bg: #faeeda;
  --ava-c: #4a3ab0;
  --ava-bg: #eeedfe;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
}

/* Layout */
.page { max-width: 1140px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

/* Header */
.header {
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-wrap: wrap; gap: 16px; margin-bottom: 1.75rem;
}
.header-left {}
.header-eyebrow {
  font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
}
.header-title {
  font-size: 24px; font-weight: 600; color: var(--text); line-height: 1.2;
}
.header-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

.filters {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 12px;
  box-shadow: var(--shadow);
}
.filters label { font-size: 12px; color: var(--text3); font-weight: 500; }
select {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; padding: 5px 10px;
  border-radius: 8px; border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text);
  cursor: pointer; outline: none;
  transition: border-color .15s;
}
select:focus { border-color: var(--blue); }

/* Metrics */
.metrics {
  display: grid; grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 10px; margin-bottom: 1.5rem;
}
.metric {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px 18px;
  box-shadow: var(--shadow);
  transition: box-shadow .2s;
}
.metric:hover { box-shadow: var(--shadow-md); }
.metric-label {
  font-size: 11px; font-weight: 500; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.06em;
  line-height: 1.4; margin-bottom: 8px;
}
.metric-val { font-size: 26px; font-weight: 600; font-family: 'DM Mono', monospace; }
.metric-val.green { color: var(--green); }
.metric-val.red { color: var(--red); }
.metric-val.blue { color: var(--blue); }
.metric-val.amber { color: var(--amber); }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.tab {
  padding: 8px 20px; border-radius: 8px;
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s; box-shadow: var(--shadow);
}
.tab:hover { background: var(--surface2); color: var(--text); }
.tab.active {
  background: var(--text); color: #fff; border-color: var(--text);
  box-shadow: var(--shadow-md);
}

/* Bar chart */
.section { margin-bottom: 2rem; }
.section-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
}
.section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
.badge {
  font-size: 11px; padding: 2px 9px; border-radius: 20px;
  font-weight: 500;
}
.badge-velo { background: var(--blue-bg); color: var(--blue); }
.badge-caps { background: var(--green-bg); color: var(--green); }

.bars-wrap { display: flex; flex-direction: column; gap: 5px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-name {
  font-size: 12px; color: var(--text2); width: 138px; flex-shrink: 0;
  text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-weight: 500;
}
.bar-track {
  flex: 1; height: 24px; background: var(--surface2);
  border-radius: 6px; overflow: hidden; min-width: 80px;
  border: 1px solid var(--border);
}
.bar-fill {
  height: 100%; border-radius: 6px;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 8px; transition: width .6s cubic-bezier(.4,0,.2,1);
}
.bar-pct { font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; }
.bar-chains { display: flex; gap: 4px; flex-shrink: 0; }
.chain-tag {
  font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500;
}

/* Alerts */
.alert-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 10px; max-height: 520px; overflow-y: auto;
  padding-right: 2px;
}
.alert-grid::-webkit-scrollbar { width: 4px; }
.alert-grid::-webkit-scrollbar-track { background: var(--surface2); border-radius: 4px; }
.alert-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
.alert-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 12px 14px;
  border-left: 3px solid var(--red);
  box-shadow: var(--shadow); transition: box-shadow .15s;
}
.alert-card:hover { box-shadow: var(--shadow-md); }
.alert-card.warn { border-left-color: #d97706; }
.alert-pos { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
.alert-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.prom-tag {
  font-size: 11px; padding: 2px 8px; border-radius: 20px;
  background: var(--surface2); color: var(--text2); font-weight: 500;
}
.pct-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; font-family: 'DM Mono', monospace; }
.pct-crit { background: var(--red-bg); color: var(--red); }
.pct-warn { background: var(--amber-bg); color: var(--amber); }

/* Promotor view */
.promo-btn-section { margin-bottom: 1.5rem; }
.promo-btn-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
.promo-btns { display: flex; flex-wrap: wrap; gap: 8px; }
.promo-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500; padding: 6px 14px;
  border-radius: 20px; border: 1px solid var(--border2);
  background: var(--surface); color: var(--text2);
  cursor: pointer; transition: all .15s; box-shadow: var(--shadow);
}
.promo-btn:hover { background: var(--surface2); color: var(--text); }
.promo-btn.active {
  background: var(--text); color: #fff; border-color: var(--text);
}

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(26,25,22,0.45); z-index: 999;
  align-items: flex-start; justify-content: center;
  padding: 3rem 1rem; overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius-lg);
  border: 1px solid var(--border); width: 100%; max-width: 740px;
  padding: 1.75rem; box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  animation: slideUp .2s ease;
}
@keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
.modal-title { font-size: 18px; font-weight: 600; color: var(--text); }
.modal-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }
.modal-close {
  font-family: 'DM Sans', sans-serif;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 5px 12px; cursor: pointer;
  font-size: 12px; color: var(--text2); font-weight: 500;
  transition: all .15s;
}
.modal-close:hover { background: var(--surface); color: var(--text); }
.modal-metrics {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-bottom: 1.25rem;
}
.modal-metric {
  background: var(--surface2); border-radius: var(--radius);
  padding: 12px 14px; border: 1px solid var(--border);
}
.modal-metric .lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 5px; }
.modal-metric .val { font-size: 20px; font-weight: 600; font-family: 'DM Mono', monospace; }

.modal-controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.cat-btns { display: flex; gap: 4px; }
.cat-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text2); cursor: pointer; font-weight: 500; transition: all .15s;
}
.cat-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
.modal-sort { margin-left: auto; }

.table-wrap {
  max-height: 360px; overflow-y: auto;
  border: 1px solid var(--border); border-radius: var(--radius);
}
.table-wrap::-webkit-scrollbar { width: 4px; }
.table-wrap::-webkit-scrollbar-track { background: var(--surface2); }
.table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  position: sticky; top: 0; background: var(--surface2);
  padding: 9px 12px; text-align: left;
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .05em;
  border-bottom: 1px solid var(--border2);
}
tbody td {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  color: var(--text);
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--surface2); }
.num { text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; }
.pct-pill {
  display: inline-block; padding: 2px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace;
  white-space: nowrap;
}
.empty-row td { text-align: center; color: var(--text3); padding: 2rem; }

/* Responsive */
@media (max-width: 680px) {
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .modal-metrics { grid-template-columns: repeat(2, 1fr); }
  .header { flex-direction: column; }
}
</style>
</head>

<div class="page">

  <!-- HEADER -->
  <div class="header">

      <h1 class="header-title">Dashboard Conectados — Marzo 2026</h1>

    </div>
    <div class="filters">
      <label>Cadena:</label>
      <select id="cadenaFilter" onchange="render()">
        <option value="ALL">Todas las cadenas</option>
        <option value="TAMBO">TAMBO</option>
        <option value="OXXO">OXXO</option>
        <option value="PRIMAX">PRIMAX</option>
        <option value="AVA">AVA</option>
      </select>
      <label>Categoría:</label>
      <select id="catFilter" onchange="render()">
        <option value="ALL">Todas</option>
        <option value="VELO">Velo</option>
        <option value="LS CAPS">LS Caps</option>
      </select>
    </div>
  </div>

  <!-- METRICS -->
  <div class="metrics" id="metrics"></div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('bars',this)">Avance por promotor</button>
    <button class="tab" onclick="switchTab('alerts',this)">POS críticos &lt;50%</button>
    <button class="tab" onclick="switchTab('promo',this)">Ver por promotor</button>
  </div>

  <!-- TAB: BARS -->
  <div id="barsTab">
    <div id="veloSection"></div>
    <div id="capsSection"></div>
  </div>

  <!-- TAB: ALERTS -->
  <div id="alertsTab" style="display:none">
    <div class="section">
      <div class="section-header">
        <span class="section-title">POS con avance menor al 50%</span>
        <span id="alertBadge" class="badge" style="background:var(--red-bg);color:var(--red)"></span>
      </div>
      <div class="alert-grid" id="alertGrid"></div>
    </div>
  </div>

  <!-- TAB: PROMOTOR -->
  <div id="promoTab" style="display:none">
    <div class="promo-btn-section">
      <div class="promo-btn-label">Selecciona un promotor</div>
      <div class="promo-btns" id="promoBtns"></div>
    </div>
  </div>

</div><!-- /page -->

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalBox">
    <div class="modal-top">
      <div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">Cerrar ✕</button>
    </div>
    <div class="modal-metrics" id="modalMetrics"></div>
    <div class="modal-controls">
      <div class="cat-btns">
        <button class="cat-btn active" onclick="setModalCat('ALL',this)">Todas</button>
        <button class="cat-btn" onclick="setModalCat('VELO',this)">Velo</button>
        <button class="cat-btn" onclick="setModalCat('LS CAPS',this)">LS Caps</button>
      </div>
      <div class="modal-sort">
        <select id="modalSort" onchange="renderModalTable()" style="font-size:12px;padding:4px 10px">
          <option value="pct_asc">% Avance ↑</option>
          <option value="pct_desc">% Avance ↓</option>
          <option value="pos">POS A–Z</option>
        </select>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>POS TT AUDIT</th>
            <th>Cadena</th>
            <th>Categoría</th>
            <th class="num">Cuota</th>
            <th class="num">Avance</th>
            <th>Avance %</th>
          </tr>
        </thead>
        <tbody id="modalTbody"></tbody>
      </table>
    </div>
  </div>
</div>

  {pos:"AVA - PUEBLO LIBRE",p:"JOSE BENDEZÚ",c:"AVA",cat:"VELO",pct:0.0},
  {pos:"AVA - LOMA",p:"SARAI AZO",c:"AVA",cat:"VELO",pct:0.4},
  {pos:"AVA - PIURA",p:"SARAI AZO",c:"AVA",cat:"VELO",pct:0.0},
  {pos:"AVA - ESPINAR",p:"STEPHANY APUMAYTA",c:"AVA",cat:"VELO",pct:0.47},
  {pos:"AVA - LA FONDA",p:"VALERIA HUAMAN",c:"AVA",cat:"VELO",pct:0.0},
  {pos:"AVA - BARRANCO",p:"YAQUELIN BORJA",c:"AVA",cat:"VELO",pct:0.09}
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const CC = {TAMBO:{c:'var(--tambo-c)',bg:'var(--tambo-bg)'},OXXO:{c:'var(--oxxo-c)',bg:'var(--oxxo-bg)'},PRIMAX:{c:'var(--primax-c)',bg:'var(--primax-bg)'},AVA:{c:'var(--ava-c)',bg:'var(--ava-bg)'}};

function pctColor(p){
  if(p>=1) return {c:'var(--green)',bg:'var(--green-bg)'};
  if(p>=0.75) return {c:'#2d7a3a',bg:'#e8f5eb'};
  if(p>=0.5) return {c:'var(--amber)',bg:'var(--amber-bg)'};
  return {c:'var(--red)',bg:'var(--red-bg)'};
}

function pill(p, cls=''){
  const {c,bg} = pctColor(p);
  return `<span class="pct-pill ${cls}" style="color:${c};background:${bg}">${(p*100).toFixed(1)}%</span>`;
}

function chainTag(c){
  const s = CC[c] || {c:'#888',bg:'#eee'};
  return `<span class="chain-tag" style="color:${s.c};background:${s.bg}">${c}</span>`;
}

function catTag(cat){
  if(cat==='VELO') return `<span class="chain-tag" style="color:var(--blue);background:var(--blue-bg)">VELO</span>`;
  return `<span class="chain-tag" style="color:var(--green);background:var(--green-bg)">LS CAPS</span>`;
}

function getFilters(){
  return {cadena: document.getElementById('cadenaFilter').value, cat: document.getElementById('catFilter').value};
}

function filterRaw(){
  const f = getFilters();
  return RAW.filter(d => (f.cadena==='ALL'||d.CADENA===f.cadena) && (f.cat==='ALL'||d.CATEGORIA===f.cat));
}

// ── METRICS ───────────────────────────────────────────────────────────────────
function renderMetrics(data){
  const cuota = data.reduce((s,d)=>s+d.cuota,0);
  const av = data.reduce((s,d)=>s+d.avance,0);
  const gp = cuota>0 ? av/cuota : 0;
  const above50 = data.filter(d=>d.avance_pct>=0.5).length;
  const {c} = pctColor(gp);
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Avance global</div><div class="metric-val" style="color:${c}">${(gp*100).toFixed(1)}%</div></div>
    <div class="metric"><div class="metric-label">Total avance</div><div class="metric-val blue">${av.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">Cuota total</div><div class="metric-val amber">${Math.round(cuota).toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">#POS con Registro de Venta ≥ 50%</div><div class="metric-val green">${above50} / ${data.length}</div></div>
  `;
}

// ── BAR SECTIONS ──────────────────────────────────────────────────────────────
function renderBars(data, cat, containerId, label, badgeClass){
  const rows = (cat==='ALL' ? data : data.filter(d=>d.CATEGORIA===cat));
  if(!rows.length){ document.getElementById(containerId).innerHTML=''; return; }
  const byP = {};
  rows.forEach(d=>{
    if(!byP[d.PROMOTOR]) byP[d.PROMOTOR]={cuota:0,av:0,chains:[]};
    byP[d.PROMOTOR].cuota += d.cuota;
    byP[d.PROMOTOR].av += d.avance;
    byP[d.PROMOTOR].chains.push(d.CADENA);
  });
  const sorted = Object.entries(byP).map(([p,v])=>({
    p, pct: v.cuota>0?v.av/v.cuota:0, chains:[...new Set(v.chains)], av:v.av, cuota:v.cuota
  })).sort((a,b)=>b.pct-a.pct);
  const maxP = Math.min(Math.max(...sorted.map(r=>r.pct))*1.05, 3.5);

  let html = `<div class="section">
    <div class="section-header">
      <span class="section-title">${label}</span>
      <span class="badge ${badgeClass}">${sorted.length} promotores</span>
    </div>
    <div class="bars-wrap">`;

  sorted.forEach(r=>{
    const w = Math.min((r.pct/maxP)*100,100);
    const {c,bg} = pctColor(r.pct);
    const chains = r.chains.map(ch=>chainTag(ch)).join('');
    html += `<div class="bar-row">
      <div class="bar-name" title="${r.p}">${r.p.split(' ')[0]} ${r.p.split(' ')[1]||''}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${w}%;background:${bg};border:1px solid ${c}40">
          <span class="bar-pct" style="color:${c}">${(r.pct*100).toFixed(1)}%</span>
        </div>
      </div>
      <div class="bar-chains">${chains}</div>
    </div>`;
  });
  html += `</div></div>`;
  document.getElementById(containerId).innerHTML = html;
}

// ── ALERTS ────────────────────────────────────────────────────────────────────
function renderAlerts(){
  const f = getFilters();
  const data = LOW_RAW.filter(d=>(f.cadena==='ALL'||d.c===f.cadena)&&(f.cat==='ALL'||d.cat===f.cat)).sort((a,b)=>a.pct-b.pct);
  document.getElementById('alertBadge').textContent = data.length + ' POS';
  if(!data.length){ document.getElementById('alertGrid').innerHTML='<p style="color:var(--text3);font-size:13px;padding:1rem 0">No hay POS críticos con los filtros seleccionados.</p>'; return; }
  document.getElementById('alertGrid').innerHTML = data.map(d=>{
    const isCrit = d.pct < 0.25;
    const {bg:chainBg, c:chainC} = CC[d.c]||{c:'#888',bg:'#eee'};
    const catBg = d.cat==='VELO'?'var(--blue-bg)':'var(--green-bg)';
    const catC = d.cat==='VELO'?'var(--blue)':'var(--green)';
    return `<div class="alert-card ${isCrit?'':'warn'}">
      <div class="alert-pos">${d.pos}</div>
      <div class="alert-tags">
        <span class="prom-tag">${d.p}</span>
        <span class="chain-tag" style="color:${chainC};background:${chainBg}">${d.c}</span>
        <span class="chain-tag" style="color:${catC};background:${catBg}">${d.cat}</span>
        <span class="pct-tag ${isCrit?'pct-crit':'pct-warn'}">${(d.pct*100).toFixed(1)}%</span>
      </div>
    </div>`;
  }).join('');
}

// ── PROMO BUTTONS ─────────────────────────────────────────────────────────────
function renderPromoBtns(){
  const promos = [...new Set(POS_DATA.map(d=>d.p))].sort();
  document.getElementById('promoBtns').innerHTML = promos.map(p=>
    `<button class="promo-btn" onclick="openModal('${p.replace(/'/g,"\\'")}',this)">${p}</button>`
  ).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
let _modalP = null, _modalCat = 'ALL';

function openModal(p, btn){
  document.querySelectorAll('.promo-btn').forEach(b=>b.classList.remove('active'));
  btn && btn.classList.add('active');
  _modalP = p; _modalCat = 'ALL';
  document.querySelectorAll('.cat-btn').forEach((b,i)=>{ b.classList.remove('active'); if(i===0)b.classList.add('active'); });
  document.getElementById('modalSort').value = 'pct_asc';

  const rows = POS_DATA.filter(d=>d.p===p);
  const totC = rows.reduce((s,d)=>s+d.cuota,0);
  const totA = rows.reduce((s,d)=>s+d.av,0);
  const gp = totC>0?totA/totC:0;
  const above50 = rows.filter(d=>d.pct>=0.5).length;
  const {c} = pctColor(gp);

  document.getElementById('modalTitle').textContent = p;
  document.getElementById('modalSub').textContent = 'Performance de POS TT AUDIT — Marzo 2026';
  document.getElementById('modalMetrics').innerHTML = `
    <div class="modal-metric"><div class="lbl">Avance global</div><div class="val" style="color:${c}">${(gp*100).toFixed(1)}%</div></div>
    <div class="modal-metric"><div class="lbl">Avance / Cuota</div><div class="val" style="font-size:14px;color:var(--text)">${totA.toLocaleString()} / ${Math.round(totC).toLocaleString()}</div></div>
    <div class="modal-metric"><div class="lbl">#POS con Registro ≥ 50%</div><div class="val green" style="color:var(--green)">${above50} / ${rows.length}</div></div>
  `;
  renderModalTable();
  document.getElementById('modalOverlay').classList.add('open');
}

function renderModalTable(){
  if(!_modalP) return;
  let rows = POS_DATA.filter(d=>d.p===_modalP);
  if(_modalCat!=='ALL') rows = rows.filter(d=>d.cat===_modalCat);
  const sort = document.getElementById('modalSort').value;
  if(sort==='pct_asc') rows.sort((a,b)=>a.pct-b.pct);
  else if(sort==='pct_desc') rows.sort((a,b)=>b.pct-a.pct);
  else rows.sort((a,b)=>a.pos.localeCompare(b.pos));

  if(!rows.length){
    document.getElementById('modalTbody').innerHTML='<tr class="empty-row"><td colspan="6">Sin datos para la categoría seleccionada.</td></tr>';
    return;
  }
  document.getElementById('modalTbody').innerHTML = rows.map(d=>`
    <tr>
      <td>${d.pos}</td>
      <td>${chainTag(d.c)}</td>
      <td>${catTag(d.cat)}</td>
      <td class="num">${Math.round(d.cuota).toLocaleString()}</td>
      <td class="num">${d.av.toLocaleString()}</td>
      <td>${pill(d.pct)}</td>
    </tr>
  `).join('');
}

function setModalCat(cat, el){
  _modalCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderModalTable();
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.querySelectorAll('.promo-btn').forEach(b=>b.classList.remove('active'));
}

function handleOverlayClick(e){
  if(e.target===document.getElementById('modalOverlay')) closeModal();
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('barsTab').style.display   = tab==='bars'  ? 'block':'none';
  document.getElementById('alertsTab').style.display = tab==='alerts'? 'block':'none';
  document.getElementById('promoTab').style.display  = tab==='promo' ? 'block':'none';
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  const data = filterRaw();
  const f = getFilters();
  renderMetrics(data);
  const sv = f.cat==='ALL'||f.cat==='VELO';
  const sc = f.cat==='ALL'||f.cat==='LS CAPS';
  if(sv) renderBars(data,'VELO','veloSection','Velo','badge-velo');
  else document.getElementById('veloSection').innerHTML='';
  if(sc) renderBars(data,'LS CAPS','capsSection','LS Caps','badge-caps');
  else document.getElementById('capsSection').innerHTML='';
  renderAlerts();
}

renderPromoBtns();
render();
</script>
</body>
</html>
